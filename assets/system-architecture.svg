<svg viewBox="0 0 1060 900" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img">
  <title>Secant Pay system architecture</title>
  <desc>Layered architecture across seven tiers (Client, Frontend, Wallets, Backend, Storage, External Providers, Settlement Chains) with invoice creation, Blink building, Dialect payment requests, Helius settlement, and first-party services emphasized.</desc>

  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.6" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="5.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arA" markerWidth="8" markerHeight="8" refX="5.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4f46e5"/>
    </marker>
  </defs>

  <style>
    .lane   { fill:#fcfcfd; stroke:#eef1f5; stroke-width:1; }
    .lanec  { fill:#f6f7fb; stroke:#e0e3ef; stroke-width:1; }
    .tab    { fill:#4f46e5; }
    .tier   { font-size:11px; font-weight:700; letter-spacing:.8px; fill:#334155; }
    .tsub   { font-size:8.5px; font-weight:500; fill:#94a3b8; }
    .card   { fill:#ffffff; stroke:#cbd5e1; stroke-width:1; }
    .core   { fill:#f8fafc; stroke:#0f172a; stroke-width:1.5; }
    .nt     { font-size:12px; font-weight:600; fill:#0f172a; }
    .ns     { font-size:8.5px; font-weight:400; fill:#64748b; }
    .e      { stroke:#94a3b8; stroke-width:1.4; fill:none; marker-end:url(#ar); }
    .ed     { stroke:#94a3b8; stroke-width:1.3; fill:none; stroke-dasharray:5 4; marker-end:url(#ar); }
    .ep     { stroke:#4f46e5; stroke-width:1.7; fill:none; marker-end:url(#arA); }
    .el     { font-size:8.5px; fill:#64748b; }
    .elp    { font-size:8.5px; font-weight:600; fill:#4f46e5; }
    .badge  { fill:#4f46e5; }
    .bnum   { font-size:9px; font-weight:700; fill:#ffffff; }
    .h1     { font-size:19px; font-weight:700; fill:#0f172a; }
    .h2     { font-size:11px; font-weight:400; fill:#64748b; }
  </style>

  <rect x="0" y="0" width="1060" height="900" fill="#ffffff"/>

  <!-- header -->
  <text class="h1" x="32" y="44">Secant Pay — System Architecture</text>
  <text class="h2" x="32" y="64">Self-custodial USDC checkout across Base and Solana. Secant never holds funds; wallets sign, chains settle.</text>
  <line x1="32" y1="80" x2="1028" y2="80" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ============ LANES ============ -->
  <rect class="lane"  x="24" y="96"  width="1012" height="94" rx="10"/>
  <rect class="lane"  x="24" y="198" width="1012" height="86" rx="10"/>
  <rect class="lane"  x="24" y="292" width="1012" height="78" rx="10"/>
  <rect class="lanec" x="24" y="378" width="1012" height="98" rx="10"/>
  <rect class="lane"  x="24" y="484" width="1012" height="74" rx="10"/>
  <rect class="lane"  x="24" y="566" width="1012" height="92" rx="10"/>
  <rect class="lane"  x="24" y="666" width="1012" height="76" rx="10"/>

  <!-- lane accent tabs -->
  <rect class="tab" x="24" y="96"  width="4" height="94" rx="2"/>
  <rect class="tab" x="24" y="198" width="4" height="86" rx="2"/>
  <rect class="tab" x="24" y="292" width="4" height="78" rx="2"/>
  <rect class="tab" x="24" y="378" width="4" height="98" rx="2"/>
  <rect class="tab" x="24" y="484" width="4" height="74" rx="2"/>
  <rect class="tab" x="24" y="566" width="4" height="92" rx="2"/>
  <rect class="tab" x="24" y="666" width="4" height="76" rx="2"/>

  <!-- lane labels -->
  <text class="tier" x="40" y="132">CLIENT</text>          <text class="tsub" x="40" y="146">surfaces</text>
  <text class="tier" x="40" y="232">FRONTEND</text>        <text class="tsub" x="40" y="246">Next.js · Vercel</text>
  <text class="tier" x="40" y="324">WALLETS</text>         <text class="tsub" x="40" y="338">self-custodial</text>
  <text class="tier" x="40" y="416">BACKEND</text>         <text class="tsub" x="40" y="430">Go · AWS Lambda</text>
  <text class="tier" x="40" y="514">STORAGE</text>         <text class="tsub" x="40" y="528">DynamoDB</text>
  <text class="tier" x="40" y="602">PROVIDERS</text>       <text class="tsub" x="40" y="616">external APIs</text>
  <text class="tier" x="40" y="700">CHAINS</text>          <text class="tsub" x="40" y="714">settlement</text>

  <!-- ============ NODES ============ -->
  <!-- L1 client -->
  <g filter="url(#sh)">
    <rect class="card" x="150" y="114" width="196" height="56" rx="8"/>
    <rect class="card" x="362" y="114" width="196" height="56" rx="8"/>
    <rect class="card" x="574" y="114" width="196" height="56" rx="8"/>
    <rect class="card" x="786" y="114" width="240" height="56" rx="8"/>
  </g>
  <text class="nt" x="248" y="139" text-anchor="middle">Merchant Dashboard</text>
  <text class="ns" x="248" y="153" text-anchor="middle">invoices · inbox · history</text>
  <text class="nt" x="460" y="139" text-anchor="middle">Scan &amp; Pay Terminal</text>
  <text class="ns" x="460" y="153" text-anchor="middle">point-of-sale · QR</text>
  <text class="nt" x="672" y="139" text-anchor="middle">Secant SDK</text>
  <text class="ns" x="672" y="153" text-anchor="middle">embeddable checkout</text>
  <text class="nt" x="906" y="139" text-anchor="middle">Blink Client</text>
  <text class="ns" x="906" y="153" text-anchor="middle">wallet · dial.to · X feed</text>

  <!-- L2 frontend -->
  <g filter="url(#sh)">
    <rect class="card" x="150" y="216" width="430" height="52" rx="8"/>
    <rect class="card" x="596" y="216" width="430" height="52" rx="8"/>
  </g>
  <text class="nt" x="365" y="238" text-anchor="middle">App Router</text>
  <text class="ns" x="365" y="252" text-anchor="middle">Dashboard · Checkout · Invoices · Swap · PoS · /pay</text>
  <text class="nt" x="811" y="238" text-anchor="middle">API Routes</text>
  <text class="ns" x="811" y="252" text-anchor="middle">provider proxy · action proxy · alerts · webhook · RPC proxy</text>

  <!-- L3 wallets -->
  <g filter="url(#sh)">
    <rect class="card" x="150" y="308" width="430" height="46" rx="8"/>
    <rect class="card" x="596" y="308" width="430" height="46" rx="8"/>
  </g>
  <text class="nt" x="365" y="335" text-anchor="middle">EVM Wallets · MetaMask · Coinbase · Rabby</text>
  <text class="nt" x="811" y="335" text-anchor="middle">Solana Wallets · Phantom · Solflare · Backpack</text>

  <!-- L4 backend (core, first-party) -->
  <g filter="url(#sh)">
    <rect class="core" x="150" y="396" width="208" height="62" rx="8"/>
    <rect class="core" x="374" y="396" width="208" height="62" rx="8"/>
    <rect class="core" x="598" y="396" width="208" height="62" rx="8"/>
    <rect class="core" x="822" y="396" width="204" height="62" rx="8"/>
  </g>
  <text class="nt" x="254" y="422" text-anchor="middle">HTTP Handlers</text>
  <text class="ns" x="254" y="436" text-anchor="middle">per-endpoint auth · schema</text>
  <text class="nt" x="478" y="422" text-anchor="middle">Invoice Initiator</text>
  <text class="ns" x="478" y="436" text-anchor="middle">id · amount · expiry</text>
  <text class="nt" x="702" y="422" text-anchor="middle">Blink / Action Builder</text>
  <text class="ns" x="702" y="436" text-anchor="middle">invoice-addressed tx</text>
  <text class="nt" x="924" y="422" text-anchor="middle">Settlement Receiver</text>
  <text class="ns" x="924" y="436" text-anchor="middle">validate · atomic settle</text>
  <text class="elp" x="254" y="388">first-party core — builds every signable transaction</text>

  <!-- L5 storage -->
  <g filter="url(#sh)">
    <rect class="card" x="388" y="498" width="300" height="46" rx="8"/>
  </g>
  <text class="nt" x="538" y="519" text-anchor="middle">DynamoDB</text>
  <text class="ns" x="538" y="533" text-anchor="middle">invoices (TTL) · markers · settings · usage · Helius watch</text>

  <!-- L6 providers -->
  <g filter="url(#sh)">
    <rect class="card" x="150" y="584" width="136" height="56" rx="8"/>
    <rect class="card" x="304" y="584" width="136" height="56" rx="8"/>
    <rect class="card" x="458" y="584" width="136" height="56" rx="8"/>
    <rect class="card" x="612" y="584" width="118" height="56" rx="8"/>
    <rect class="card" x="748" y="584" width="136" height="56" rx="8"/>
    <rect class="card" x="902" y="584" width="124" height="56" rx="8"/>
  </g>
  <text class="nt" x="218" y="608" text-anchor="middle">Zerion</text>
  <text class="ns" x="218" y="622" text-anchor="middle">EVM data · swaps</text>
  <text class="nt" x="372" y="608" text-anchor="middle">Jupiter</text>
  <text class="ns" x="372" y="622" text-anchor="middle">SPL · checkout</text>
  <text class="nt" x="526" y="608" text-anchor="middle">Helius</text>
  <text class="ns" x="526" y="622" text-anchor="middle">webhook · WS</text>
  <text class="nt" x="671" y="608" text-anchor="middle">SNS</text>
  <text class="ns" x="671" y="622" text-anchor="middle">.sol names</text>
  <text class="nt" x="816" y="608" text-anchor="middle">Dialect Alerts</text>
  <text class="ns" x="816" y="622" text-anchor="middle">invoice request</text>
  <text class="nt" x="964" y="608" text-anchor="middle">dial.to</text>
  <text class="ns" x="964" y="622" text-anchor="middle">Blink renderer</text>

  <!-- L7 chains -->
  <g filter="url(#sh)">
    <rect class="card" x="150" y="684" width="430" height="44" rx="8"/>
    <rect class="card" x="596" y="684" width="430" height="44" rx="8"/>
  </g>
  <text class="nt" x="365" y="711" text-anchor="middle">Base / Base Sepolia · EVM USDC</text>
  <text class="nt" x="811" y="711" text-anchor="middle">Solana / Devnet · SPL USDC</text>

  <!-- ============ EDGES ============ -->
  <!-- 1 client -> frontend -->
  <path class="ep" d="M248,170 L330,216"/>
  <circle class="badge" cx="276" cy="186" r="8"/><text class="bnum" x="276" y="189" text-anchor="middle">1</text>
  <text class="elp" x="300" y="204">create invoice · HTTPS</text>
  <!-- blink -> API routes -->
  <path class="e" d="M906,170 C906,190 850,196 811,216"/>
  <text class="el" x="892" y="200" text-anchor="middle">GET/POST action</text>

  <!-- app router internal -> API routes -->
  <path class="e" d="M580,242 L596,242"/>

  <!-- 2 API -> backend handlers (right rail, skips wallet lane) -->
  <path class="ep" d="M1026,242 L1046,242 L1046,427 L1030,427"/>
  <circle class="badge" cx="1046" cy="335" r="8"/><text class="bnum" x="1046" y="338" text-anchor="middle">2</text>
  <text class="elp" x="1046" y="250" text-anchor="end">route · HTTPS</text>

  <!-- app router -> wallets -->
  <path class="e" d="M300,268 L320,308"/>
  <path class="e" d="M520,268 L760,308"/>
  <text class="el" x="430" y="296" text-anchor="middle">connect · sign requests</text>

  <!-- handlers -> initiator / blink / settler -->
  <path class="e" d="M358,427 L374,427"/>
  <path class="e" d="M582,427 L598,427"/>
  <path class="e" d="M806,427 L822,427"/>

  <!-- 3 initiator -> dynamodb ; settler -> dynamodb -->
  <path class="ep" d="M478,458 C478,478 540,480 560,498"/>
  <circle class="badge" cx="500" cy="476" r="8"/><text class="bnum" x="500" y="479" text-anchor="middle">3</text>
  <text class="elp" x="455" y="492" text-anchor="end">store</text>
  <path class="ep" d="M900,458 L900,476 L588,476 L588,498"/>
  <circle class="badge" cx="700" cy="476" r="8"/><text class="bnum" x="700" y="479" text-anchor="middle">8</text>
  <text class="elp" x="640" y="470" text-anchor="end">atomic settle</text>

  <!-- API -> providers (left rail) -->
  <path class="e" d="M150,250 L120,250 L120,584 L150,600"/>
  <text class="el" x="112" y="420" text-anchor="end" transform="rotate(-90 112 420)">keys stay server-side · HTTPS</text>
  <!-- 7 helius webhook -> API (left rail inner) -->
  <path class="ed" d="M526,584 C526,520 138,520 138,268 L150,250"/>
  <circle class="badge" cx="138" cy="430" r="8"/><text class="bnum" x="138" y="433" text-anchor="middle">7</text>
  <text class="elp" x="146" y="500" transform="rotate(-90 146 500)">settlement webhook</text>

  <!-- 4 blink builder -> solana (RPC) right rail -->
  <path class="ed" d="M806,420 C1010,420 1010,690 880,690 L826,690"/>
  <text class="el" x="1016" y="560" text-anchor="middle" transform="rotate(-90 1016 560)">RPC read · blockhash, ATA</text>
  <circle class="badge" cx="1010" cy="555" r="8"/><text class="bnum" x="1010" y="558" text-anchor="middle">4</text>

  <!-- 5 solana wallet -> solana ; 6 verify -->
  <path class="ep" d="M811,354 L811,684"/>
  <circle class="badge" cx="811" cy="520" r="8"/><text class="bnum" x="811" y="523" text-anchor="middle">5</text>
  <text class="elp" x="822" y="500">sign &amp; submit · tx</text>
  <path class="e" d="M365,354 L365,684"/>
  <text class="el" x="376" y="500">sign &amp; submit · tx</text>
  <path class="ed" d="M924,458 C988,470 988,668 880,672" />
  <circle class="badge" cx="980" cy="600" r="8"/><text class="bnum" x="980" y="603" text-anchor="middle">6</text>
  <text class="el" x="986" y="540" text-anchor="middle" transform="rotate(-90 986 540)">verify tx · RPC</text>

  <!-- dialect alert + renderer annotations -->
  <path class="ed" d="M816,584 C816,510 720,500 650,476"/>
  <text class="el" x="790" y="520" text-anchor="middle">payment request alert</text>
  <path class="ed" d="M964,584 C964,400 1030,300 1030,180 L1006,160 L990,166"/>
  <text class="el" x="1020" y="380" text-anchor="middle" transform="rotate(-90 1020 380)">renders Blink card</text>

  <!-- ============ LEGEND ============ -->
  <rect x="24" y="760" width="1012" height="116" rx="10" fill="#fbfcfe" stroke="#eef1f5"/>
  <text class="tier" x="44" y="786">LEGEND</text>

  <rect class="core" x="44" y="800" width="34" height="22" rx="5"/>
  <text class="ns" x="86" y="815" fill="#334155">First-party service (builds signable transactions)</text>
  <rect class="card" x="44" y="834" width="34" height="22" rx="5"/>
  <text class="ns" x="86" y="849" fill="#334155">External / standard integration</text>

  <line x1="430" y1="811" x2="476" y2="811" class="ep"/>
  <text class="ns" x="486" y="815" fill="#334155">Primary request lifecycle (numbered 1–8)</text>
  <line x1="430" y1="845" x2="476" y2="845" class="e"/>
  <text class="ns" x="486" y="849" fill="#334155">Synchronous call</text>
  <line x1="710" y1="845" x2="756" y2="845" class="ed"/>
  <text class="ns" x="766" y="849" fill="#334155">Async / verify / render</text>

  <text class="ns" x="710" y="808" fill="#334155">1 create  ·  2 route  ·  3 store  ·  4 build tx</text>
  <text class="ns" x="710" y="822" fill="#334155">5 sign &amp; submit  ·  6 verify  ·  7 webhook  ·  8 settle</text>
</svg>
